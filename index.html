<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with Dev</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1e1e24;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .chat-container {
            width: 400px;
            max-width: 90%;
            background: #ffffff;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        .chat-header {
            background: #ff4500;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
        }
        .chat-box {
            height: 400px;
            overflow-y: auto;
            padding: 15px;
            background: #f5f5f5;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            padding: 10px 15px;
            border-radius: 20px;
            max-width: 75%;
            font-size: 15px;
            word-wrap: break-word;
        }
        .user-msg {
            background: #dcf8c6;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }
        .bot-msg {
            background: #ffffff;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            border: 1px solid #ddd;
        }
        .input-area {
            display: flex;
            padding: 10px;
            background: #fff;
            border-top: 1px solid #ddd;
        }
        #user-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 20px;
            outline: none;
        }
        #send-btn {
            background: #ff4500;
            color: white;
            border: none;
            padding: 10px 15px;
            margin-left: 10px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">Dev (AstraToonix)</div>
    <div class="chat-box" id="chat-box">
        <div class="message bot-msg">Bolo bhai, kya kaam hai?</div>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Message likho..." onkeypress="handleKeyPress(event)">
        <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    // Koyeb par deploy hone ke baad URL change kar dena 
    // Example: const backendUrl = "https://your-app.koyeb.app/chat";
    const backendUrl = "http://localhost:8080/chat"; 

    function appendMessage(text, sender) {
        const chatBox = document.getElementById("chat-box");
        const msgDiv = document.createElement("div");
        msgDiv.classList.add("message", sender === "user" ? "user-msg" : "bot-msg");
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight; 
    }

    async function sendMessage() {
        const inputField = document.getElementById("user-input");
        const message = inputField.value.trim();
        if (!message) return;

        appendMessage(message, "user");
        inputField.value = "";

        try {
            const response = await fetch(backendUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: message })
            });
            const data = await response.json();
            appendMessage(data.reply || "No reply from server", "bot");
        } catch (error) {
            appendMessage("Bhai, server connect nahi ho raha hai.", "bot");
        }
    }

    function handleKeyPress(event) {
        if (event.key === "Enter") sendMessage();
    }
</script>

</body>
</html>
