<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat with Dev | AstraToonix</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #1e1e24;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .chat-container {
            width: 400px;
            max-width: 90%;
            background: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
        }
        .chat-header {
            background: #ff4500;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .chat-box {
            height: 400px;
            overflow-y: auto;
            padding: 15px;
            background: #f0f2f5;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message {
            padding: 10px 15px;
            border-radius: 18px;
            max-width: 80%;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
            position: relative;
        }
        .user-msg {
            background: #ff4500;
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 2px;
        }
        .bot-msg {
            background: #ffffff;
            color: #333;
            align-self: flex-start;
            border-bottom-left-radius: 2px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .input-area {
            display: flex;
            padding: 15px;
            background: #fff;
            border-top: 1px solid #ddd;
        }
        #user-input {
            flex: 1;
            padding: 12px 18px;
            border: 1px solid #ccc;
            border-radius: 25px;
            outline: none;
            font-size: 15px;
        }
        #send-btn {
            background: #ff4500;
            color: white;
            border: none;
            padding: 0 20px;
            margin-left: 10px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        #send-btn:hover {
            background: #e63e00;
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">Dev (AstraToonix)</div>
    <div class="chat-box" id="chat-box">
        <div class="message bot-msg">Aur bhai Rajdev! Bol kya help karun?</div>
    </div>
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Yahan likho..." onkeypress="handleKeyPress(event)">
        <button id="send-btn" onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
    /* DHYAN DEIN: 
       Yahan apna Koyeb ka final URL dalo.
       Example: "https://my-bot-app.koyeb.app/chat"
    */
    const backendUrl = "https://explicit-miranda-rajdev-3d1ae6bb.koyeb.app"; 

    function appendMessage(text, sender) {
        const chatBox = document.getElementById("chat-box");
        const msgDiv = document.createElement("div");
        msgDiv.classList.add("message", sender === "user" ? "user-msg" : "bot-msg");
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function sendMessage() {
        const inputField = document.getElementById("user-input");
        const message = inputField.value.trim();
        
        if (!message) return;

        appendMessage(message, "user");
        inputField.value = "";

        // Loading indicator ke liye
        const loadingId = "loading-" + Date.now();
        const chatBox = document.getElementById("chat-box");
        const loadingDiv = document.createElement("div");
        loadingDiv.classList.add("message", "bot-msg");
        loadingDiv.id = loadingId;
        loadingDiv.innerText = "...";
        chatBox.appendChild(loadingDiv);

        try {
            const response = await fetch(backendUrl, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message: message })
            });
            
            const data = await response.json();
            document.getElementById(loadingId).remove(); // Loading hatayen
            
            if (data.reply) {
                appendMessage(data.reply, "bot");
            } else {
                appendMessage("Bhai, server ne koi jawaab nahi diya.", "bot");
            }
        } catch (error) {
            document.getElementById(loadingId).remove();
            appendMessage("Connect nahi ho raha! URL check kar lo.", "bot");
        }
    }

    function handleKeyPress(event) {
        if (event.key === "Enter") sendMessage();
    }
</script>

</body>
</html>
